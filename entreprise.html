<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <script>
  (function () {
    window.__SITE_ROOT__ = '';
    if (location.protocol === 'file:') return;
    var host = location.hostname;
    if (host === 'localhost' || host === '127.0.0.1') return;
    if (host.endsWith('github.io')) {
      var seg = location.pathname.split('/').filter(Boolean)[0];
      if (seg && !/\.html$/i.test(seg)) window.__SITE_ROOT__ = '/' + seg + '/';
    }
  })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Entreprise — Eliot Fiette</title>
  <script>
    (function () {
      var base = (window.__SITE_ROOT__ || '') + 'index.html';
      var h = location.hash;
      if (!h || h === '#') h = '#entreprise';
      location.replace(base + h);
    })();
  </script>
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:#080c14;color:#7585a0;font-family:system-ui,sans-serif;">
  <p style="text-align:center;line-height:1.8;">
    Redirection vers la section <strong style="color:#e1e7f5;">Entreprise</strong>…<br/>
    <a id="entreprise-fallback" href="index.html#entreprise" style="color:#60a5fa;">Cliquez ici</a> si rien ne se passe.
  </p>
  <script>
    (function () {
      var a = document.getElementById('entreprise-fallback');
      if (a) a.href = (window.__SITE_ROOT__ || '') + 'index.html#entreprise';
    })();
  </script>
</body>
</html>
